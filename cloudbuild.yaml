steps:
  - id: install
    name: 'node:20'
    entrypoint: 'bash'
    args: ['-c', 'corepack enable && pnpm install --frozen-lockfile']

  - id: lint
    name: 'node:20'
    entrypoint: 'bash'
    args: ['-c', 'corepack enable && pnpm run lint']

  - id: test
    name: 'node:20'
    entrypoint: 'bash'
    args: ['-c', 'corepack enable && pnpm run test']

  - id: build
    name: 'node:20'
    entrypoint: 'bash'
    args: ['-c', 'corepack enable && NEXT_TELEMETRY_DISABLED=1 pnpm run build']
    env:
      - 'NEXT_PUBLIC_SUPABASE_URL=https://aiawwfgtjuuxzgcqvujn.supabase.co'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpYXd3Zmd0anV1eHpnY3F2dWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjI3MDYsImV4cCI6MjA5MDUzODcwNn0.bOSWPOcwSKi7Lb3Mnatr9rLyGNBt8UEUwUaXaY3aKdY'
      - 'NEXT_PUBLIC_SITE_URL=https://collaborative-novel-f3hfydm6ta-an.a.run.app'
      - 'NEXT_TELEMETRY_DISABLED=1'

  - id: docker-auth
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['auth', 'configure-docker', 'asia-northeast1-docker.pkg.dev']

  - id: docker-build
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/novel/api:$SHORT_SHA'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=https://aiawwfgtjuuxzgcqvujn.supabase.co'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpYXd3Zmd0anV1eHpnY3F2dWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjI3MDYsImV4cCI6MjA5MDUzODcwNn0.bOSWPOcwSKi7Lb3Mnatr9rLyGNBt8UEUwUaXaY3aKdY'
      - '--build-arg'
      - 'NEXT_PUBLIC_SITE_URL=https://collaborative-novel-f3hfydm6ta-an.a.run.app'
      - '.'

  - id: docker-push
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/novel/api:$SHORT_SHA']

  - id: deploy
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    secretEnv: ['GEMINI_API_KEY']
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/novel/api:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--update-env-vars=NEXT_PUBLIC_SUPABASE_URL=$$NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY=$$NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SITE_URL=$$NEXT_PUBLIC_SITE_URL,GEMINI_API_KEY=$$GEMINI_API_KEY'


  # デプロイ後に本番URLへLighthouse計測（モバイル・スコア85未満でwarn）
  - id: lighthouse
    name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update -qq && apt-get install -y chromium 2>/dev/null
        npx --yes @lhci/cli@0.14 autorun
    waitFor: ['deploy']

substitutions:
  _REGION: 'asia-northeast1'
  _SERVICE_NAME: 'collaborative-novel'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
